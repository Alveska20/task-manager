name: CI

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24" # Atualizado para a versão mais recente e estável

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present # O "--if-present" evita o erro 127 caso não haja testes
